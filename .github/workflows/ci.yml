name: CI

on:
  push:
    branches: ["main", "**"]
  pull_request:
    branches: ["main"]
  workflow_dispatch: {}

# Cancel in-progress runs of the same branch when a new push lands.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # 1. In-process validators (no compiled C++ artifacts needed).
  #    Covers ~40 in-process validators; SKIPs the 4 external-state ones
  #    and the C++-binary ones (since this job doesn't build C++).
  validators:
    name: Python validator sweep
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies for validators
        run: |
          python -m pip install --upgrade pip
          # cryptography: needed by scripts/generate_tls_dev_cert.py used in
          # several TLS validators. psycopg only matters when the postgres
          # validators are run; CI skips them as SKIP_EXTERNAL anyway.
          python -m pip install cryptography

      - name: Run validator sweep
        run: python scripts/_sweep_validators.py

  # 2. Linux C++ build of the portable targets (no Qt required).
  #    Validates that chat_client_core compiles under POSIX libc — the same
  #    code path Qt for Android already exercises on Bionic — and runs the
  #    portable C++ test exes.
  linux-cpp:
    name: Linux C++ build (no Qt)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ninja-build

      - name: Configure
        run: |
          cmake -S . -B build-linux -GNinja \
            -DCMAKE_BUILD_TYPE=Release \
            -DTELEGRAM_LIKE_SKIP_WINDEPLOYQT=ON

      - name: Build portable targets
        # Qt-dependent targets (app_desktop, app_mobile) auto-disable when
        # find_package(Qt6) returns Qt6_FOUND=FALSE.
        run: |
          cmake --build build-linux --target \
            chat_client_core \
            telegram_like_client \
            app_chat \
            app_desktop_store_test \
            json_parser_test \
            remote_session_smoke

      - name: Run C++ test binaries
        run: |
          ./build-linux/client/src/json_parser_test
          ./build-linux/client/src/app_desktop_store_test

      - name: Re-run validator sweep with built C++ binaries
        run: |
          python -m pip install --upgrade pip
          python -m pip install cryptography
          python scripts/_sweep_validators.py

  # 3. Linux desktop build — pulls Qt 6 from apt and builds app_desktop
  #    + app_mobile (Qt Widgets + Qt Quick) plus all portable targets.
  #    Verifies the same source tree we ship for Windows + Android also
  #    builds on Ubuntu's system Qt 6.4.
  linux-desktop:
    name: Linux Qt desktop + mobile build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install build deps + Qt 6 + Qt Quick from apt
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential cmake ninja-build \
            qt6-base-dev qt6-tools-dev libgl1-mesa-dev \
            qt6-declarative-dev \
            qml6-module-qtquick qml6-module-qtquick-controls \
            qml6-module-qtquick-window qml6-module-qtquick-layouts

      - name: Configure
        run: cmake -S . -B build-linux -GNinja -DCMAKE_BUILD_TYPE=Release

      - name: Build Qt desktop + mobile + portable targets
        run: |
          cmake --build build-linux --target \
            app_desktop app_mobile \
            chat_client_core json_parser_test app_desktop_store_test \
            app_chat telegram_like_client remote_session_smoke

      - name: Run portable C++ tests
        run: |
          ./build-linux/client/src/json_parser_test
          ./build-linux/client/src/app_desktop_store_test

  # 4. macOS desktop + mobile-preview build via Homebrew Qt 6.
  #    Qt for iOS is NOT in Homebrew (it's only in the official Qt online
  #    installer for macOS hosts), so this job builds desktop macOS .app
  #    bundles only — iOS remains a hand-off (see deploy/ios/README.md).
  macos-build:
    name: macOS Qt desktop + mobile build
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Qt 6 via Homebrew
        run: |
          brew update
          brew install qt@6 cmake ninja

      - name: Configure
        run: |
          export PATH="$(brew --prefix qt@6)/bin:$PATH"
          cmake -S . -B build-macos -GNinja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="$(brew --prefix qt@6)"

      - name: Build Qt desktop + mobile + portable targets
        run: |
          cmake --build build-macos --target \
            chat_client_core json_parser_test app_desktop_store_test \
            app_chat telegram_like_client remote_session_smoke \
            app_desktop app_mobile

      - name: Run portable C++ tests
        run: |
          ./build-macos/client/src/json_parser_test
          ./build-macos/client/src/app_desktop_store_test

      - name: Confirm .app bundles materialised
        run: |
          test -d build-macos/client/src/app_desktop.app
          test -d build-macos/client/src/app_mobile.app

  # 5. Bundle integrity — every requirement still has a covering milestone
  #    and there are no stale fail-gates.
  bundle-verify:
    name: Idea-to-code bundle verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Vendor manage_delivery_bundle.py from Claude skills tree
        # The skill script normally lives under ~/.claude/skills/idea-to-code/.
        # On a clean CI runner we don't have the skill installed, so we
        # invoke a minimal subset directly: parse status.json + assert the
        # invariants verify checks (every REQ has at least one covering
        # milestone; no fail gate; required files exist).
        run: |
          cat > /tmp/bundle_verify.py <<'EOF'
          import json, sys
          from pathlib import Path
          bundle = Path(".idea-to-code/telegram-platform")
          status_path = bundle / "status.json"
          if not status_path.exists():
              print(f"[FAIL] missing {status_path}")
              sys.exit(1)
          status = json.loads(status_path.read_text(encoding="utf-8"))
          for required in ("00-idea.md", "01-requirements.md", "02-prd.md",
                           "03-milestones.md", "04-verification.md", "status.json"):
              if not (bundle / required).exists():
                  print(f"[FAIL] required artifact missing: {required}")
                  sys.exit(1)
          requirements = status.get("requirements", [])
          milestones = status.get("milestones", [])
          covering = {req["id"]: [] for req in requirements}
          for m in milestones:
              for cov in m.get("covers", []) or []:
                  if cov in covering:
                      covering[cov].append(m["name"])
          missing = [rid for rid, names in covering.items() if not names]
          fail_gates = [m for m in milestones if m.get("gate_status") == "fail"]
          if missing:
              print(f"[FAIL] uncovered REQs: {missing[:10]}")
              sys.exit(1)
          if fail_gates:
              print(f"[FAIL] fail gates not resolved: {[m['name'] for m in fail_gates][:5]}")
              sys.exit(1)
          print(f"[ok] {len(requirements)} requirements, all covered, 0 fail gates")
          EOF
          python /tmp/bundle_verify.py

  # 6. Windows desktop + mobile build (M130). Pulls Qt 6 via aqtinstall and
  #    builds every C++ target the Windows installer ships, then runs the
  #    portable C++ tests + the validator sweep with built binaries.
  windows-build:
    name: Windows Qt desktop + mobile build
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Qt 6 (aqtinstall)
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.7.3"
          host: windows
          target: desktop
          arch: win64_msvc2019_64
          modules: "qtshadertools"

      - name: Install validator deps
        shell: cmd
        run: python -m pip install --upgrade pip cryptography

      - name: Configure (MSVC 2019 / Visual Studio generator)
        shell: cmd
        run: cmake -S . -B build -G "Visual Studio 17 2022" -A x64

      - name: Build all targets
        shell: cmd
        run: cmake --build build --config Release --target chat_client_core json_parser_test app_desktop_store_test app_chat telegram_like_client remote_session_smoke app_desktop app_mobile

      - name: Run portable C++ tests
        shell: cmd
        run: |
          build\client\src\Release\json_parser_test.exe
          build\client\src\Release\app_desktop_store_test.exe

      - name: Validator sweep with built binaries
        shell: cmd
        run: python scripts\_sweep_validators.py

  # 7. Android APK build (M130). Uses Qt for Android via aqtinstall + the
  #    Android NDK + JDK 21. The build happens on ubuntu (where Qt for
  #    Android is published as an aqtinstall target). qt-android-cmake
  #    drives the gradle pieces.
  android-build:
    name: Android APK (Qt for Android)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Set up Android NDK
        id: ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r26d

      - name: Install Qt 6 desktop host (needed by Qt for Android cross-build)
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.7.3"
          host: linux
          target: desktop
          arch: linux_gcc_64
          modules: "qtshadertools"

      - name: Install Qt 6 for Android (arm64-v8a)
        uses: jurplel/install-qt-action@v4
        with:
          version: "6.7.3"
          host: linux
          target: android
          arch: android_arm64_v8a
          modules: "qtshadertools"

      - name: Configure with qt-cmake (cross-build)
        env:
          ANDROID_NDK_ROOT: ${{ steps.ndk.outputs.ndk-path }}
        run: |
          set -e
          # Qt6_DIR is set by the LAST install-qt-action (the android one)
          # to <root>/<version>/<arch>/lib/cmake/Qt6 — climb four levels to
          # the version dir so the sister gcc_64 + android_arm64_v8a arch
          # dirs resolve cleanly.
          QT_ANDROID="${Qt6_DIR}/../../../../android_arm64_v8a"
          if [ ! -d "$QT_ANDROID" ]; then
            QT_ANDROID="$(find $RUNNER_WORKSPACE -maxdepth 6 -type d -name 'android_arm64_v8a' | head -1)"
          fi
          QT_HOST="${Qt6_DIR}/../../../../gcc_64"
          if [ ! -d "$QT_HOST" ]; then
            QT_HOST="$(find $RUNNER_WORKSPACE -maxdepth 6 -type d -name 'gcc_64' | head -1)"
          fi
          echo "QT_ANDROID=$QT_ANDROID"
          echo "QT_HOST=$QT_HOST"
          "$QT_ANDROID/bin/qt-cmake" -S . -B build-android -GNinja \
            -DCMAKE_BUILD_TYPE=Release \
            -DQT_HOST_PATH="$QT_HOST" \
            -DANDROID_PLATFORM=android-26

      - name: Build APK
        run: |
          set -e
          # The Qt 6 Android build emits a non-fatal ninja warning after the
          # APK is produced; treat the file's existence as the success signal.
          cmake --build build-android --target apk || true
          APK="$(find build-android -type f -name 'android-build-release-unsigned.apk' | head -1)"
          if [ -z "$APK" ]; then
            APK="$(find build-android -type f -name '*.apk' | head -1)"
          fi
          if [ -z "$APK" ]; then
            echo "no APK produced under build-android"
            exit 1
          fi
          ls -la "$APK"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: telegram-like-android-arm64-v8a
          path: build-android/**/*.apk
          if-no-files-found: error
