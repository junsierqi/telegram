<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<title>Telegram-like Web Client</title>
<style>
  body { font-family: system-ui, sans-serif; margin: 0; background: #1a1a1a; color: #eee; }
  header { padding: 12px 18px; background: #232323; border-bottom: 1px solid #333; }
  main { display: grid; grid-template-columns: 240px 1fr; height: calc(100vh - 50px); }
  #sidebar { background: #1f1f1f; border-right: 1px solid #333; padding: 12px; overflow-y: auto; }
  #chat { display: flex; flex-direction: column; }
  #log { flex: 1; overflow-y: auto; padding: 12px; }
  #log .row { margin-bottom: 6px; line-height: 1.4; word-wrap: break-word; }
  #log .me { color: #5cd55c; }
  #log .peer { color: #5cd5d5; }
  #log .system { color: #888; font-size: 0.85em; }
  #log .error { color: #ff5c5c; }
  #composer { display: flex; padding: 10px; border-top: 1px solid #333; background: #1f1f1f; }
  #composer input { flex: 1; padding: 8px; background: #2a2a2a; color: #eee; border: 1px solid #333; border-radius: 4px; }
  #composer button { margin-left: 8px; padding: 8px 18px; background: #2a73d3; color: white; border: 0; border-radius: 4px; cursor: pointer; }
  #login { padding: 12px; }
  #login input, #login select { display: block; width: 100%; box-sizing: border-box; margin-bottom: 8px; padding: 6px; background: #2a2a2a; color: #eee; border: 1px solid #333; border-radius: 4px; }
  #login button { width: 100%; padding: 8px; background: #2a73d3; color: white; border: 0; border-radius: 4px; cursor: pointer; }
  h2 { margin: 0 0 8px 0; font-size: 1em; color: #aaa; text-transform: uppercase; letter-spacing: 0.05em; }
</style>
</head>
<body>
<header><strong>Telegram-like</strong> &mdash; web client (M110)</header>
<main>
  <aside id="sidebar">
    <div id="login">
      <h2>Sign in</h2>
      <input id="username" placeholder="username" value="alice" />
      <input id="password" type="password" placeholder="password" value="alice_pw" />
      <input id="device" placeholder="device_id" value="dev_alice_web" />
      <button id="connect">Connect</button>
      <h2 style="margin-top: 18px">Conversation</h2>
      <input id="conversation" placeholder="conversation_id" value="conv_alice_bob" />
    </div>
  </aside>
  <section id="chat">
    <div id="log"></div>
    <form id="composer">
      <input id="text" placeholder="Message" autocomplete="off" />
      <button type="submit">Send</button>
    </form>
  </section>
</main>
<script src="/app.js"></script>
</body>
</html>
