<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="manifest" href="/manifest.webmanifest" />
<title>Telegram-like Web Client</title>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; font-family: system-ui, sans-serif; background: #1a1a1a; color: #eee; }
  header { padding: 10px 16px; background: #232323; border-bottom: 1px solid #333; display: flex; align-items: center; gap: 12px; }
  header h1 { font-size: 1em; margin: 0; flex: 1; }
  header .who { color: #888; font-size: 0.85em; }
  main { display: grid; grid-template-columns: 280px 1fr; height: calc(100vh - 44px); }
  /* ---- sidebar (login + chat list) ---- */
  #sidebar { background: #1f1f1f; border-right: 1px solid #333; display: flex; flex-direction: column; }
  #login { padding: 12px; border-bottom: 1px solid #333; }
  #login input { display: block; width: 100%; margin-bottom: 6px; padding: 6px; background: #2a2a2a; color: #eee; border: 1px solid #333; border-radius: 4px; }
  #login button { width: 100%; padding: 8px; background: #2a73d3; color: white; border: 0; border-radius: 4px; cursor: pointer; }
  #login.connected { display: none; }
  #chatList { flex: 1; overflow-y: auto; padding: 8px 0; }
  .chat-row { padding: 10px 14px; border-bottom: 1px solid #2a2a2a; cursor: pointer; display: flex; align-items: center; gap: 10px; }
  .chat-row:hover { background: #262626; }
  .chat-row.active { background: #2a73d3; }
  .chat-avatar { width: 36px; height: 36px; border-radius: 18px; background: #65aadd; color: white; display: flex; align-items: center; justify-content: center; font-weight: bold; flex-shrink: 0; }
  .chat-meta { flex: 1; min-width: 0; }
  .chat-title { font-weight: bold; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .chat-snippet { color: #888; font-size: 0.8em; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .chat-row.active .chat-snippet { color: #cee9ff; }
  .chat-unread { background: #5cd55c; color: black; border-radius: 11px; padding: 2px 7px; font-size: 0.75em; font-weight: bold; }
  /* ---- chat pane ---- */
  #chat { display: flex; flex-direction: column; min-width: 0; }
  #chatHeader { padding: 12px 18px; background: #232323; border-bottom: 1px solid #333; font-weight: bold; }
  #log { flex: 1; overflow-y: auto; padding: 12px; }
  #log .row { margin-bottom: 6px; line-height: 1.4; word-wrap: break-word; padding: 6px 10px; border-radius: 6px; max-width: 80%; }
  #log .me { color: #5cd55c; background: #1f2e1f; margin-left: auto; }
  #log .peer { color: #5cd5d5; background: #1f2929; }
  #log .system { color: #888; font-size: 0.85em; background: transparent; }
  #log .error { color: #ff5c5c; background: #2a1f1f; }
  #log .attach { display: inline-block; padding: 4px 8px; background: #333; border-radius: 4px; margin-top: 4px; cursor: pointer; }
  #log .attach:hover { background: #444; }
  #composer { display: flex; padding: 10px; border-top: 1px solid #333; background: #1f1f1f; gap: 8px; }
  #composer input[type=text] { flex: 1; padding: 8px; background: #2a2a2a; color: #eee; border: 1px solid #333; border-radius: 4px; }
  #composer button { padding: 8px 18px; background: #2a73d3; color: white; border: 0; border-radius: 4px; cursor: pointer; }
  #composer label.attach-btn { padding: 8px 14px; background: #333; color: #eee; border-radius: 4px; cursor: pointer; }
  #composer label.attach-btn:hover { background: #444; }
  #composer input[type=file] { display: none; }
  /* ---- empty state ---- */
  #emptyChat { flex: 1; display: flex; align-items: center; justify-content: center; color: #555; font-style: italic; }
</style>
</head>
<body>
<header>
  <h1>Telegram-like &mdash; web client (M110-M124)</h1>
  <span class="who" id="whoLabel">disconnected</span>
  <button id="callBtn" disabled style="padding: 4px 10px; background: #5cd55c; color: black; border: 0; border-radius: 4px; cursor: pointer;">Call</button>
</header>
<main>
  <aside id="sidebar">
    <div id="login">
      <input id="username" placeholder="username" value="alice" autocomplete="username" />
      <input id="password" type="password" placeholder="password" value="alice_pw" autocomplete="current-password" />
      <input id="device" placeholder="device_id" value="dev_alice_web" autocomplete="off" />
      <button id="connect">Connect</button>
    </div>
    <div id="chatList"></div>
  </aside>
  <section id="chat">
    <div id="chatHeader">No chat selected</div>
    <div id="emptyChat">Sign in to start chatting.</div>
    <div id="log" style="display:none"></div>
    <form id="composer" style="display:none">
      <input id="text" type="text" placeholder="Message" autocomplete="off" />
      <label class="attach-btn">📎 <input id="fileInput" type="file" /></label>
      <button type="submit">Send</button>
    </form>
  </section>
</main>
<dialog id="callDialog" style="background: #232323; color: #eee; border: 1px solid #444; border-radius: 8px; padding: 18px; min-width: 320px;">
  <h3 style="margin-top: 0">Call</h3>
  <div id="callStatus" style="margin-bottom: 12px; color: #888;">No active call</div>
  <input id="calleeUser" placeholder="callee user_id" style="width: 100%; padding: 6px; background: #2a2a2a; color: #eee; border: 1px solid #333; border-radius: 4px; margin-bottom: 6px" />
  <input id="calleeDevice" placeholder="callee device_id" style="width: 100%; padding: 6px; background: #2a2a2a; color: #eee; border: 1px solid #333; border-radius: 4px; margin-bottom: 6px" />
  <select id="callKind" style="width: 100%; padding: 6px; background: #2a2a2a; color: #eee; border: 1px solid #333; border-radius: 4px; margin-bottom: 12px">
    <option value="audio">audio</option>
    <option value="video">video</option>
  </select>
  <div style="display: flex; gap: 6px; flex-wrap: wrap">
    <button id="callInvite" style="flex: 1; padding: 8px; background: #5cd55c; color: black; border: 0; border-radius: 4px; cursor: pointer">Invite</button>
    <button id="callAccept" disabled style="flex: 1; padding: 8px; background: #2a73d3; color: white; border: 0; border-radius: 4px; cursor: pointer">Accept</button>
    <button id="callDecline" disabled style="flex: 1; padding: 8px; background: #ff5c5c; color: white; border: 0; border-radius: 4px; cursor: pointer">Decline</button>
    <button id="callEnd" disabled style="flex: 1; padding: 8px; background: #555; color: white; border: 0; border-radius: 4px; cursor: pointer">End</button>
  </div>
  <button id="callClose" style="margin-top: 10px; width: 100%; padding: 6px; background: transparent; color: #888; border: 1px solid #444; border-radius: 4px; cursor: pointer">Close</button>
</dialog>
<script src="/app.js"></script>
</body>
</html>
