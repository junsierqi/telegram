# M115 production HTTP + WebSocket reverse proxy + TLS termination.
#
# Fronts the M110 web bridge:
#   /            -> static index.html served by telegram-server-prod:8080
#   /app.js      -> static app.js   served by telegram-server-prod:8080
#   /ws          -> WebSocket upgrade to telegram-server-prod:8080/ws
#   /healthz     -> /healthz on telegram-server-prod:9100 (M92 sidecar)
#
# Cert paths assume the same /etc/nginx/certs mount as nginx-postgres.conf
# (deploy/tls/certs/server.{crt,key}). For real production swap in a Let's
# Encrypt or commercial cert pair via the same mount point.

worker_processes auto;
events {
    worker_connections 1024;
}

http {
    # Required so $connection_upgrade is "upgrade" only on a real WS upgrade
    # request and "close" otherwise — never set Connection: upgrade
    # unconditionally or you'll break HTTP/1.1 keepalive on / and /app.js.
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    upstream telegram_web_bridge {
        server telegram-server-prod:8080;
        keepalive 32;
    }

    upstream telegram_observability {
        server telegram-server-prod:9100;
    }

    # ---- 80 -> 443 redirect ----
    server {
        listen 80 default_server;
        server_name _;
        # Pass through ACME http-01 challenges if Let's Encrypt is in use.
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }
        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ---- 443 TLS termination + reverse proxy ----
    server {
        listen 443 ssl;
        http2 on;
        server_name _;

        ssl_certificate     /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;
        ssl_session_cache   shared:SSL:10m;
        ssl_session_timeout 1d;

        # Long enough for the WebSocket idle timeout in the browser; bridge
        # itself doesn't send pings yet, so this is the practical ceiling.
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
        proxy_connect_timeout 5s;
        proxy_buffering off;

        # Reasonable upload ceiling for chunked attachment init payload
        # (the chunked path uploads in 1 MB chunks; 16 MB is plenty of head).
        client_max_body_size 16m;

        # WebSocket upgrade endpoint.
        location = /ws {
            proxy_pass http://telegram_web_bridge/ws;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;
        }

        # Healthz passthrough so external probes hit the M92 sidecar.
        location = /healthz {
            proxy_pass http://telegram_observability/healthz;
            proxy_set_header Host $host;
            proxy_read_timeout 5s;
        }

        # Static asset serving — keep this last so /ws and /healthz match first.
        location / {
            proxy_pass http://telegram_web_bridge;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto https;

            # The bridge sets Cache-Control: no-store on the assets it
            # currently serves, so this stays a passthrough.
        }
    }
}
