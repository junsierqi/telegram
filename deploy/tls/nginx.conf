events {}

stream {
    upstream telegram_control_plane {
        server telegram-server:8787;
    }

    server {
        listen 8443 ssl;
        proxy_pass telegram_control_plane;

        ssl_certificate /etc/nginx/certs/server.crt;
        ssl_certificate_key /etc/nginx/certs/server.key;
        ssl_protocols TLSv1.2 TLSv1.3;
    }
}
